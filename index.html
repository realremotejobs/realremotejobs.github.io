<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Inter', Arial, sans-serif;
  background:#F5F7FA;
  color:#173B72;
  line-height:1.5;
}

img{
  max-width:100%;
  display:block;
}


header{
  background:#F5F7FA;
  text-align:center;
  padding:12px 20px 8px;
  border-bottom:1px solid #dbe3ec;
}

.header-logo{
  width:100%;
  max-width:1180px;   /* smaller than before */
  height:auto;
  display:block;
  margin:0 auto;
}

.container{
  max-width:1120px;
  margin:0 auto;
  padding:28px 20px 18px;
}

/* Shared cards */

.promo-strip,
.filter-card,
.category-card{
  background:#FFFFFF;
  border:1px solid #dfeaf7;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(74,111,165,0.10);
}

/* Promo strips */

.promo-strip{
  padding:20px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:22px;
  margin-bottom:24px;
}

.promo-left{
  display:flex;
  align-items:center;
  gap:18px;
  min-width:0;
}

.promo-icon-img{
  width:78px;
  height:78px;
  object-fit:contain;
  flex-shrink:0;
}

.promo-text h2,
.promo-text h3{
  font-family:'Patrick Hand', cursive;
  font-weight:400;
  color:#173B72;
  font-size:32px;
  line-height:1.05;
  margin:0 0 5px;
}

.promo-text p{
  margin:0;
  color:#173B72;
  font-size:16px;
}

.promo-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:#4A6FA5;
  color:#FFFFFF;
  text-decoration:none;
  padding:14px 24px;
  border-radius:10px;
  font-weight:800;
  min-width:170px;
  white-space:nowrap;
  border:1px solid #3d6296;
}

.promo-btn:hover{
  background:#3f6294;
}

.download-btn{
  background:#7FB069;
  border-color:#6da75b;
}

.download-btn:hover{
  background:#6da75b;
}

/* Filters */

.filter-card{
  padding:20px 22px;
  margin-bottom:24px;
}

.filter-row{
  display:grid;
  grid-template-columns:260px 1fr 1fr 1.45fr;
  gap:16px;
  align-items:center;
}

.filter-label{
  display:flex;
  align-items:center;
  gap:12px;
  font-family:'Patrick Hand', cursive;
  font-size:32px;
  color:#173B72;
  white-space:nowrap;
}

.filter-icon-img{
  width:58px;
  height:58px;
  object-fit:contain;
  flex-shrink:0;
}

.filter-row select,
.filter-row input{
  width:100%;
  height:48px;
  border:1px solid #cfddef;
  border-radius:10px;
  background:#FFFFFF;
  color:#173B72;
  font-size:15px;
  padding:0 14px;
  font-family:'Inter', Arial, sans-serif;
}

.filter-row input::placeholder{
  color:#51657e;
}

/* Category grid/cards */

.group-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:20px;
}

.category-card{
  padding:20px;
}

.category-heading{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:16px;
}

.category-icon-img{
  width:78px;
  height:78px;
  object-fit:contain;
  flex-shrink:0;
}

.category-card h3{
  font-family:'Patrick Hand', cursive;
  font-size:30px;
  font-weight:400;
  color:#173B72;
  line-height:1.05;
  margin:0;
}

.category-subtitle{
  margin-top:6px;
  color:#0047A3;
  font-size:16px;
  font-weight:600;
}

.view-listings-btn{
  width:100%;
  border:1px solid #c9dcf4;
  background:#eef5ff;
  color:#0047A3;
  border-radius:10px;
  padding:12px 14px;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.view-listings-btn:hover{
  background:#e5f0ff;
}

.toggle-section{
  display:none;
}

.toggle-section.show{
  display:block;
}

.listing-list{
  display:grid;
  gap:12px;
  margin-top:14px;
}

.listing-row{
  background:#f8fbff;
  border:1px solid #dfeaf7;
  border-radius:12px;
  padding:14px;
}

.job-title{
  color:#173B72;
  font-weight:800;
  margin-bottom:5px;
  font-size:15px;
}

.company-name{
  color:#4A6FA5;
  font-weight:800;
  margin-bottom:5px;
  font-size:14px;
}

.listing-meta{
  color:#51657e;
  font-size:13px;
  line-height:1.45;
  margin-bottom:10px;
}

.job-actions{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.apply-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#4A6FA5;
  color:white;
  text-decoration:none;
  border-radius:9px;
  padding:9px 14px;
  font-weight:800;
  font-size:14px;
}

.apply-btn:hover{
  background:#3f6294;
}

.job-toggle-btn{
  border:none;
  background:transparent;
  color:#0047A3;
  font-weight:800;
  cursor:pointer;
  padding:8px 0;
  font-size:13px;
}

.job-details{
  display:none;
  margin-top:8px;
  color:#51657e;
  font-size:13px;
  line-height:1.55;
}

.job-details.show{
  display:block;
}

.empty-message{
  grid-column:1 / -1;
  background:#FFFFFF;
  border:1px solid #dfeaf7;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(74,111,165,0.10);
  padding:26px;
  text-align:center;
  color:#51657e;
  font-weight:600;
}

/* Free template */

.template-strip{
  margin-top:24px;
}

.footer{
  background:#eef6ff;
  border-top:1px solid #dbe8f7;
  padding:14px 20px;
  text-align:center;
}

.footer-logo{
  width:min(760px, 100%);
  margin:0 auto;
  height:auto;
}

.footer-fallback{
  font-family:'Patrick Hand', cursive;
  color:#173B72;
  font-size:28px;
}

@media (max-width:1000px){
  .group-grid{
    grid-template-columns:repeat(2, 1fr);
  }

  .filter-row{
    grid-template-columns:1fr 1fr;
  }

  .filter-label{
    grid-column:1 / -1;
  }
}

@media (max-width:700px){
  .site-header{
    padding:12px 10px;
  }

  .container{
    padding:20px 14px 14px;
  }

  .promo-strip{
    flex-direction:column;
    text-align:center;
    padding:20px;
  }

  .promo-left{
    flex-direction:column;
  }

  .promo-text h2,
  .promo-text h3{
    font-size:28px;
  }

  .promo-btn{
    width:100%;
  }

  .filter-row{
    grid-template-columns:1fr;
  }

  .filter-label{
    justify-content:center;
    font-size:30px;
  }

  .group-grid{
    grid-template-columns:1fr;
  }

  .category-heading{
    align-items:center;
  }

  .category-card h3{
    font-size:28px;
  }
}
</style>

/* ============================================
   AUTOMATIC WEBSITE LOGIC
   ============================================ */

const now = new Date();
const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;

const categoryGroupsContainer = document.getElementById("categoryGroups");
const categoryFilter = document.getElementById("categoryFilter");
const locationFilter = document.getElementById("locationFilter");
const searchFilter = document.getElementById("searchFilter");

const categoryIconMap = {
  "Customer Support Jobs": "support-icon.png",
  "No Phone Jobs": "laptop-icon.png",
  "Customer Success Jobs": "success-icon.png",
  "Technical & Operations Jobs": "ops-icon.png",
  "Content & Education Jobs": "education-icon.png",
  "Member Support Jobs": "member-icon.png"
};

function escapeHTML(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDate(dateString){
  if(!dateString) return "Not listed";
  const date = new Date(dateString + "T00:00:00");
  return date.toLocaleDateString("en-US", {
    year:"numeric",
    month:"long",
    day:"numeric"
  });
}

function populateCategoryFilter(){
  const categories = [...new Set(jobs.map(job => job.category).filter(Boolean))];

  categories.forEach(category => {
    const option = document.createElement("option");
    option.value = category;
    option.textContent = category;
    categoryFilter.appendChild(option);
  });
}

function getJobLocationText(job){
  return `${job.location || ""} ${job.type || ""}`;
}

function isInternationalJob(job){
  const text = getJobLocationText(job).toLowerCase();

  const usTerms = [
    "united states", "usa", " u.s.", " us ", "remote us", "remote (us",
    "tx", "ca", "fl", "ga", "la", "ms", "ok", "tn", "nv", "az", "ut",
    "wa", "or", "id", "mt", "wy", "nm", "co", "oh", "nc", "mo", "il"
  ];

  const internationalTerms = [
    "international", "global", "canada", "philippines", "ireland",
    "germany", "singapore", "colombia", "apac", "dublin"
  ];

  if(internationalTerms.some(term => text.includes(term))) return true;
  if(usTerms.some(term => text.includes(term))) return false;

  return false;
}

function getFilteredJobs(){
  const selectedCategory = categoryFilter.value;
  const selectedLocation = locationFilter.value.toLowerCase();
  const searchText = searchFilter.value.toLowerCase().trim();

  return jobs.filter(job => {
    const matchesStatus = job.status === "open";

    const matchesCategory =
      selectedCategory === "all" ||
      job.category === selectedCategory;

    const locationText = getJobLocationText(job).toLowerCase();

    let matchesLocation = true;

    if(selectedLocation !== "all"){
      if(selectedLocation === "international"){
        matchesLocation = isInternationalJob(job);
      } else {
        matchesLocation = locationText.includes(selectedLocation);
      }
    }

    const searchableText = `${job.title || ""} ${job.company || ""} ${job.category || ""} ${job.type || ""} ${job.location || ""} ${job.description || ""}`.toLowerCase();

    const matchesSearch =
      searchText === "" ||
      searchableText.includes(searchText);

    return matchesStatus && matchesCategory && matchesLocation && matchesSearch;
  });
}

function groupJobsByCategory(jobArray){
  const grouped = {};

  jobArray.forEach(job => {
    if(!grouped[job.category]){
      grouped[job.category] = [];
    }
    grouped[job.category].push(job);
  });

  return grouped;
}

function getCategoryIcon(categoryName){
  return categoryIconMap[categoryName] || "template-icon.png";
}

function createListingRow(job){
  const jobMeta = [
    job.location ? escapeHTML(job.location) : "",
    job.type ? escapeHTML(job.type) : "",
    `Posted: ${formatDate(job.postedDate)}`
  ].filter(Boolean).join(" • ");

  return `
    <div class="listing-row">
      <div class="job-title">${escapeHTML(job.title)}</div>
      <div class="company-name">${escapeHTML(job.company)}</div>
      <div class="listing-meta">${jobMeta}</div>

      <div class="job-actions">
        <a class="apply-btn" href="${escapeHTML(job.link)}" target="_blank" rel="noopener noreferrer">
          Apply Here
        </a>

        ${job.description ? `
          <button class="job-toggle-btn" type="button">View Details</button>
        ` : ""}
      </div>

      ${job.description ? `
        <div class="job-details">
          ${escapeHTML(job.description)}
        </div>
      ` : ""}
    </div>
  `;
}

function renderCategoryJobs(){
  const openJobs = getFilteredJobs();

  if(openJobs.length === 0){
    categoryGroupsContainer.innerHTML = `
      <div class="empty-message">
        No jobs match your filters right now.
      </div>
    `;
    return;
  }

  const groupedCategories = groupJobsByCategory(openJobs);

  const cards = Object.entries(groupedCategories)
    .map(([categoryName, listings], index) => {
      const sortedListings = [...listings].sort((a,b) => new Date(b.postedDate) - new Date(a.postedDate));
      const sectionId = `listings-${index}`;
      const iconFile = getCategoryIcon(categoryName);

      return `
        <article class="category-card">
          <div class="category-heading">
            <img src="images/${iconFile}" class="category-icon-img" alt="">
            <div>
              <h3>${escapeHTML(categoryName)}</h3>
              <div class="category-subtitle">
                ${sortedListings.length} open listing${sortedListings.length !== 1 ? "s" : ""}
              </div>
            </div>
          </div>

          <button class="view-listings-btn" type="button" data-target="${sectionId}">
            <span>View Listings (${sortedListings.length})</span>
            <span>→</span>
          </button>

          <div id="${sectionId}" class="toggle-section">
            <div class="listing-list">
              ${sortedListings.map(job => createListingRow(job)).join("")}
            </div>
          </div>
        </article>
      `;
    }).join("");

  categoryGroupsContainer.innerHTML = cards;
}

document.addEventListener("click", function(e){
  const listingsButton = e.target.closest(".view-listings-btn");

  if(listingsButton){
    const targetId = listingsButton.getAttribute("data-target");
    const section = document.getElementById(targetId);

    if(!section) return;

    section.classList.toggle("show");

    const label = listingsButton.querySelector("span:first-child");
    const arrow = listingsButton.querySelector("span:last-child");

    if(section.classList.contains("show")){
      label.textContent = label.textContent.replace("View Listings", "Hide Listings");
      arrow.textContent = "↑";
    } else {
      label.textContent = label.textContent.replace("Hide Listings", "View Listings");
      arrow.textContent = "→";
    }

    return;
  }

  const detailButton = e.target.closest(".job-toggle-btn");

  if(detailButton){
    const row = detailButton.closest(".listing-row");
    const details = row.querySelector(".job-details");

    if(!details) return;

    details.classList.toggle("show");
    detailButton.textContent = details.classList.contains("show") ? "Hide Details" : "View Details";
  }
});

populateCategoryFilter();
renderCategoryJobs();

categoryFilter.addEventListener("change", renderCategoryJobs);
locationFilter.addEventListener("change", renderCategoryJobs);
searchFilter.addEventListener("input", renderCategoryJobs);
</script>
